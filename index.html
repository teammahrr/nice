<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hit Adnan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="game-shell">
      <section class="hud-card">
        <h1>Hit Adnan</h1>
        <p class="sub">Tap Adnan as fast as you can before time runs out.</p>

        <div class="stats">
          <div class="stat-box">
            <span class="label">Time</span>
            <span id="time-left" class="value">30</span>
          </div>
          <div class="stat-box">
            <span class="label">Score</span>
            <span id="score" class="value">0</span>
          </div>
          <div class="stat-box high">
            <span class="label">High Score</span>
            <span id="high-score" class="value">0</span>
          </div>
        </div>

        <div class="controls">
          <button id="start-btn" class="btn primary">Start Game</button>
          <button id="restart-btn" class="btn">Restart</button>
        </div>

        <p id="status" class="status">Press Start to begin.</p>
      </section>

      <section
        id="board"
        class="board"
        aria-label="Hit Adnan game board"
      ></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
